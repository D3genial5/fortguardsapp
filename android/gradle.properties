org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Desactiva compilación incremental Kotlin para evitar error en Windows con paths de diferentes discos
kotlin.incremental=false
# Relaja la validación de JVM-target a warning: algunos plugins (p.ej.
# screen_protector) compilan Java a 17 mientras Kotlin apunta a 21 bajo JDK 21.
kotlin.jvm.target.validation.mode=warning
