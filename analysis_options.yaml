include: package:flutter_lints/flutter.yaml

# Production-ready lints sin promover strict-casts a error.
# Estos lints son **informativos** o **warnings** — el build pasa.
# strict-casts/inference/raw-types se deja como deuda técnica para incrementar
# gradualmente, sin bloquear releases.

analyzer:
  errors:
    invalid_annotation_target: ignore
    # Bugs claros → error (rompen build)
    avoid_print: error
    unused_import: error
    # Tipo dinámicos → warning para irlos arreglando sin bloquear
    argument_type_not_assignable: warning
    invalid_assignment: warning
    return_of_invalid_type: warning
    non_bool_operand: warning
    non_bool_condition: warning
    # Suprimidos: ruido estilístico. Activar gradualmente cuando se limpie.
    unawaited_futures: ignore
    prefer_final_locals: ignore
    avoid_void_async: ignore
    prefer_single_quotes: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"
    - "build/**"

linter:
  rules:
    # Estilo
    prefer_final_locals: true
    prefer_single_quotes: true
    sort_child_properties_last: true

    # Errores comunes
    cancel_subscriptions: true
    close_sinks: true
    no_adjacent_strings_in_list: true
    throw_in_finally: true
    unawaited_futures: true

    # Async / null
    avoid_void_async: true
    null_check_on_nullable_type_parameter: true

    # Performance
    avoid_function_literals_in_foreach_calls: true
    prefer_collection_literals: true
    sized_box_for_whitespace: true
    sized_box_shrink_expand: true
